version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: colevora-app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=colevora_rims
      - DB_USERNAME=colevora_user
      - DB_PASSWORD=CoLev0ra_S3cur3_P@ssw0rd!2024
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - colevora-network

  mysql:
    image: mysql:8.0
    container_name: colevora-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: colevora_rims
      MYSQL_USER: colevora_user
      MYSQL_PASSWORD: CoLev0ra_S3cur3_P@ssw0rd!2024
      MYSQL_ROOT_PASSWORD: R00t_CoLev0ra_P@ssw0rd!2024
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/colevora_rims.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pR00t_CoLev0ra_P@ssw0rd!2024"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - colevora-network

volumes:
  mysql-data:
    driver: local

networks:
  colevora-network:
    driver: bridge
